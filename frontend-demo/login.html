<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录演示页面</title>
  <style>
    body {
      margin: 0;
      font-family: "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #95d3ff 0%, #c9f0ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      width: 380px;
      padding: 32px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.12);
    }
    .login-box h2 {
      margin: 0 0 24px;
      color: #0f172a;
      text-align: center;
    }
    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      margin-bottom: 8px;
      color: #475569;
    }
    .field input,
    .field select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
      color: #0f172a;
      outline: none;
    }
    .field input:focus,
    .field select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }
    .captcha-row {
      display: grid;
      grid-template-columns: 1fr 96px;
      gap: 10px;
      align-items: center;
    }
    .captcha-image {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #0f172a;
    }
    .login-button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #2563eb;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    .toast {
      margin-top: 18px;
      padding: 12px 15px;
      border-left: 4px solid #2563eb;
      border-radius: 12px;
      background: #eff6ff;
      color: #0f172a;
      display: none;
    }
    .toast.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>欢迎登录</h2>
    <div class="field">
      <label>用户名</label>
      <input id="username" placeholder="输入用户名" value="liujiajan" />
    </div>
    <div class="field">
      <label>密码</label>
      <input id="password" type="password" placeholder="输入密码" value="123456" />
    </div>
    <div class="field">
      <label>用户类型</label>
      <select id="userType">
        <option>普通用户</option>
        <option>管理员</option>
      </select>
    </div>
    <div class="field captcha-row">
      <input id="captcha" placeholder="验证码" />
      <div class="captcha-image" id="captchaImage">C6N1</div>
    </div>
    <button class="login-button" id="loginBtn">登录</button>
    <div class="toast" id="toast">登录成功，欢迎回来！</div>
  </div>
  <script>
    document.getElementById('loginBtn').addEventListener('click', function () {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const captcha = document.getElementById('captcha').value.trim();
      const toast = document.getElementById('toast');

      if (!username || !password || !captcha) {
        toast.textContent = '请输入完整信息后继续。';
        toast.classList.add('visible');
        return;
      }
      if (captcha.toUpperCase() !== 'C6N1') {
        toast.textContent = '验证码输入错误。';
        toast.classList.add('visible');
        return;
      }
      toast.textContent = '登录成功，欢迎回来！';
      toast.classList.add('visible');
    });
  </script>
</body>
</html>
